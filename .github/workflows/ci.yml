name: CLI Integration
on:
  push:
    branches: [ main, master, release-** ]
  pull_request:
    branches: [ main, master ]

jobs:
  cli-integration:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20.x, 22.x]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --no-audit

      - name: Build TypeScript
        run: npm run build

      - name: Run Unit Tests
        # Skip the heavyweight CLI integration tests to keep parallel load low
        # Use threads pool on Windows to avoid Vitest forks worker crash on Node 22
        run: npx vitest run --exclude tests/verification/cli-integration.test.ts ${{ runner.os == 'Windows' && '--pool=threads' || '' }}

      - name: Process-Level CLI Tests
        run: npx vitest run tests/verification/cli-integration.test.ts ${{ runner.os == 'Windows' && '--pool=threads' || '' }}
