name: Link Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Read-only — link checker only fetches HTTP, never writes.
permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Run Link Checker
        run: python3 scripts/check_links.py .
